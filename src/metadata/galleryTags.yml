# Gallery filter tags are defined here so chip order and labels stay separate
# from the gallery item content in `src/content/gallery.yml`.
#
# Schema:
# tags:
#   - id: stable tag identifier used in gallery item `tags`
#     label: display label shown in the filter UI

tags:
  - id: Featured
    label: Featured
  - id: "Academic Milestones"
    label: "Academic Milestones"
  - id: "New Roles"
    label: "New Roles"
  - id: Collaboration
    label: Collaboration
  - id: Workshops
    label: Conferences, Workshops & Bootcamps
  - id: Mentoring
    label: Mentoring
  - id: "Guest Events"
    label: Guest Events
  - id: "New Publications"
    label: "New Articles & Publicationss"
  - id: TechFest
    label: TechFest
  
