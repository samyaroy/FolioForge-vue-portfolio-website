projects:
  - title: 'Messy Mashup: Robust Music Genre Classification under Noisy Mashup Conditions'
    type: Research Project
    description: Built a deep learning pipeline for robust music genre classification under noisy mashup conditions, simulating distribution shift beyond clean training data and achieving 87% accuracy. Generated on-the-fly same-genre mashups from multi-stem audio, engineered Mel-spectrogram/MFCC representations with environmental noise augmentation, and trained CNN classifiers using both from-scratch and pretrained backbones.
    affiliation: Diploma Project (DLGenAI), BS in Data Science and Applications, `Indian Institute of Technology Madras`
    logo : ['IITM']
    tech_stack: Data Augmentation, Audio Classification, CNN, CRNN,  ResNet18, EfficientNet B0
    time_period: Jan 2026 - Apr 2026
    cred_link:
      report: https://drive.google.com/file/d/1Mpb0flVqw7FS4XTDYXEJvqx9agT7P-Ih/view?usp=drive_link
      github: https://github.com/22f2001443/MessyMashup-dl-genai-peoject
      kaggle: 

  - title: Political Comment Classification using Reddit Data (US Election 2024)
    type: Research Project
    description: Built a machine learning pipeline for classifying Reddit comments into predefined categories using a publicly available Kaggle dataset on political discourse. The main challenge was dealing with high-dimensional TF-IDF features, noisy text, and class imbalance.
    affiliation: Diploma Project (MLP), BS in Data Science and Applications, `Indian Institute of Technology Madras`
    logo : ['IITM']
    tech_stack: NLP, Logistic Regression, Random Forest, XGBoost, Naive Bayes, Python
    guide:
    time_period: Jan 2026 - Apr 2026
    cred_link:
      github: https://github.com/22f2001443/Comment-Category-Prediction-MLP_P-t1_2026

