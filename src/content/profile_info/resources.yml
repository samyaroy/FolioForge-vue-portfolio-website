# Resources content is rendered from this file.
# The Resources page's "Study Material" tab is a 3-pane layout:
#   - left column  : vertical tabs (one per category below)
#   - middle column: that category's `items` (contents)
#   - right column : that category's `links` (external links)
# The "Worth Exploring" tab renders the top-level `explore` groups as cards
# (YouTube videos, articles, or anything fun to wander into); each entry
# supports the same fields as `external` links below.
#
# Schema per category:
#   - id: unique-kebab-id
#     title: Display name shown in the tab
#     icon: any mdi-* icon name
#     description: short blurb shown above the contents
#     items:                      # middle column ("contents")
#       - title: Entry title
#         description: Optional supporting text
#         meta: Optional small label (e.g. a date or type)
#
# Top-level `external` (right column): a list of link groups.
# Each `group` renders as a heading with its `links` underneath:
#   external:
#     - group: Group heading
#       links:
#         - label: Link text
#           url: https://example.com
#             `url` is optional when the label — or a `ref:` you provide —
#             matches a Name/Alias in src/metadata/hyperlinkMetadata.yml;
#             the Website from there is used instead (an explicit url wins)
#           ref: Optional metadata Name/Alias to resolve the url from
#           description: Optional one-liner
#           speciality: Optional focus area, shown as a small dot-tag under
#                       the entry name (the `specility` spelling also works)
#           incharge: Optional person in charge, shown below the entry with an
#                     account icon; linked via the Person list in
#                     src/metadata/hyperlinkMetadata.yml when the name matches
#
# Material icon source (the round badge on each material):
#   By default it's the favicon of the material's `link` domain
#   (e.g. a youtube.com link shows the YouTube mark). It falls back to an
#   mdi icon picked from `meta` when no favicon exists, and `meta: Book`
#   always uses the mdi icon. Add an optional `logo:` to override it:
#     logo: NPTEL          -> /logo/NPTEL.png (a file in public/logo)
#     logo: https://…/x.png-> a full image URL
#     logo: mdi-youtube    -> an mdi icon token

