# Resources content is rendered from this file.
# The Resources page is a 3-pane layout:
#   - left column  : vertical tabs (one per category below)
#   - middle column: that category's `items` (contents)
#   - right column : that category's `links` (external links)
#
# Schema per category:
#   - id: unique-kebab-id
#     title: Display name shown in the tab
#     icon: any mdi-* icon name
#     description: short blurb shown above the contents
#     items:                      # middle column ("contents")
#       - title: Entry title
#         description: Optional supporting text
#         meta: Optional small label (e.g. a date or type)
#     links:                      # right column ("external links")
#       - label: Link text
#         url: https://example.com
#         description: Optional one-liner
#
# Material icon source (the round badge on each material):
#   By default it's the favicon of the material's `link` domain
#   (e.g. a youtube.com link shows the YouTube mark). It falls back to an
#   mdi icon picked from `meta` when no favicon exists, and `meta: Book`
#   always uses the mdi icon. Add an optional `logo:` to override it:
#     logo: NPTEL          -> /logo/NPTEL.png (a file in public/logo)
#     logo: https://…/x.png-> a full image URL
#     logo: mdi-youtube    -> an mdi icon token

