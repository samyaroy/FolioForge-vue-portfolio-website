    title: Attended National Workshop on Cybersecurity and Blockchain at IIIT Hyderabad
    caption: Attended a 3-day workshop on Cybersecurity and Blockchain at [[IIIT Hyderabad|International Institute of Technology (IIIT) Hyderabad|Institute]]. It was an amazing experience to reexplore **Blockchain and Cryptocurrencies** along with the latest developments in this field and to interact with experts from academia and industry.
