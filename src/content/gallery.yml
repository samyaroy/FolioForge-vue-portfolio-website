    caption: Efforts paid off! I secured an S grade in both MAD 1 and MAD 2 projects at the IITM BS Degree program. All credit goes to those late-night debugging sessions at CCD and the amazing [[Rohit sir|https://www.linkedin.com/in/rohit-kumar-39b974151/|Link]].
