# Multiple images (carousel):
# By default each card shows one image resolved from its `id`.
# To show several, add an `images:` list. The first entry is shown first,
# and left/right arrows + dots let visitors slide through the rest.
# Each entry can be a full URL or a bare CDN key (resolved to <base>/<key>.jpeg).
#   images:
#     - guest_event-01-01        # CDN key -> https://media.../guest_event-01-01.jpeg
#     - guest_event-01-01-2      # second photo
#     - https://example.com/extra.jpg  # or a full URL

