# Tiles for the Hobbies page mosaic. Loaded through data.ts, which applies
# the types.
#
# tiles entries:
#   label — hobby name (tooltip + screen readers; tiles are icon-only)
#   icon  — @mdi/font class, e.g. mdi-camera (https://pictogrammers.com/library/mdi/)
#   imageId — optional media id; renders https://media.samyabrata.codeium.xyz/{imageId}.jpeg
#   image — optional path to a picture (from public/); replaces the icon
#   tint  — true renders the tile with the soft blue accent background

tiles:
  - { label: Book, icon: mdi-book-open-variant }
  - { label: Badminton, icon: mdi-badminton }
  - { label: Hiking, icon: mdi-hiking, tint: true }
  - { label: Bike, icon: mdi-bike }
  - { label: Football, icon: mdi-soccer }
  - { label: Code, icon: mdi-code-braces, tint: true }
