    date: 2023-12-22
    location: Kerala
    places:
      - Kolkata
      - { name: Kochi, mode: flight }
      - { name: Alappuzha, mode: car, note: Houseboat on the backwaters }
      - { name: Munnar, mode: car, note: Tea country }
    summary: From a houseboat drifting through Alleppey's canals to the tea
      slopes of Munnar — Kerala in one unhurried week.
    coverImage: https://picsum.photos/seed/kerala-2023/480/360
    tags: [Backwaters, Nature]
    narrative:
      - The houseboat day recalibrates your sense of speed. Coconut groves
        slide past at walking pace, and dinner is whatever the canal-side
        market had that morning.
      - Munnar is the opposite trick — hairpin roads climbing into cloud,
        with tea bushes stitched over every slope like corduroy.
    stats:
      - { label: Days, value: '8' }
      - { label: Houseboat hours, value: '22' }
    gallery:
      - https://picsum.photos/seed/kerala-1/600/600
