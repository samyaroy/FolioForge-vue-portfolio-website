  - id: darjeeling-2025
    title: Toy trains and tea gardens in Darjeeling
    date: 2025-10-14
    location: Darjeeling, West Bengal
    places:
      - Kolkata
      - { name: Siliguri, mode: train, note: Overnight from Sealdah }
      - { name: Darjeeling, mode: car, note: Hill cart road climb }
    summary: A long weekend of toy trains, tea estates, and the Kanchenjunga
      skyline from Tiger Hill.
    coverImage: https://picsum.photos/seed/darjeeling-2025/480/360
    tags: [Mountains, Tea]
    narrative:
      - The overnight train from Sealdah dropped me into the plains at dawn,
        and the drive up the hill cart road did the rest — every switchback
        traded a degree of heat for a shade of green.
      - Tiger Hill at 4 a.m. was a crowd of shivering strangers who all went
        quiet at the same moment. Kanchenjunga catching the first light is
        worth every lost hour of sleep.
    stats:
