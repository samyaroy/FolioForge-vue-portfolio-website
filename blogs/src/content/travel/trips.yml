  - id: uttarakhand-2024
    title: Char Dham circuit through Uttarakhand
    date: 2024-05-10
    location: Uttarakhand
    places:
      - Haridwar
      - { name: Rishikesh, mode: bus }
      - { name: Uttarkashi, mode: car }
      - { name: Kedarnath, mode: foot, lat: 30.7346, lng: 79.0669 }
      - { name: Badrinath, mode: car, note: Last stop of the circuit }
    summary: Two weeks winding through the Garhwal Himalayas, from the ghats
      of Haridwar up to Kedarnath and Badrinath.
    coverImage: https://picsum.photos/seed/uttarakhand-2024/480/360
    tags: [Mountains, Pilgrimage]
    narrative:
      - The crisp mountain air hits differently when you're navigating the
        rugged terrain of the Garhwal Himalayas. This circuit was less about
        reaching a specific shrine and more about understanding the silent
        language of ancient stones and winding rivers.
      - Starting from the ghats of Haridwar, every step upwards stripped away
        the noise of the city, replacing it with the rhythmic crunch of boots
        on gravel and the distant calls of highland birds. The communities
        along the way offered a profound perspective on resilience and
        simplicity.
    stats:
      - { label: Places stayed, value: 14 villages }
      - { label: Distance, value: 320 km }
      - { label: Total trekked, value: 115 km on foot }
    gallery:
      - https://picsum.photos/seed/uttarakhand-1/600/600
      - https://picsum.photos/seed/uttarakhand-2/600/600
      - https://picsum.photos/seed/uttarakhand-3/600/600

