# Individual trips for the travel page. Loaded through trips.ts, which
# applies the types and sorts trips newest-first by date.
#
# Each trip card links to its own details page at /travel/<id>.
#
# trips entries:
#   id            — unique slug for the trip (also the details page URL)
#   title         — headline for the trip
#   date          — YYYY-MM-DD
#   places        — stops on the trip, in travel order (see below)
#   summary       — short description shown on the trip card
#   coverImage    — full URL (or CDN key) for a cover photo
#   tags          — free-form labels, e.g. [Mountains, Conference]
#   narrative     — list of long-form paragraphs for the details page
#                   (falls back to summary when omitted)
#   stats         — metric cards for the details page: {label, value} pairs
#   routeMapImage — image for the details page "Route map" card
#                   (falls back to coverImage when omitted)
#   gallery       — photo URLs for the details page gallery grid
#
# places — each stop is either a bare name, or an object that will feed the
# animated route map on the details page:
#   name   — display name; also the geocoding query (required)
#   mode   — how this stop was reached from the PREVIOUS one; omit on the
#            first stop. One of: flight | train | bus | car | ferry | foot.
#            Will pick the animation style (e.g. arced path for flights).
#   state  — disambiguates geocoding between same-named places
#   lat    — explicit coordinates; when both are set, geocoding is
#   lng      skipped for this stop (use for small places the geocoder misses)
#   nights — nights stayed here; can size the stop's marker on the map
#   note   — short tooltip line, e.g. "Shore temples"
#
# Example:
#   - id: uttarakhand-2024
#     title: Char Dham circuit through Uttarakhand
#     date: 2024-05-10
#     places:
#       - Haridwar                                # bare name is fine
#       - { name: Rishikesh, mode: bus }
#       - { name: Kedarnath, mode: foot, lat: 30.7346, lng: 79.0669 }
#     summary: Two weeks winding through the Garhwal Himalayas.
#     tags: [Mountains, Pilgrimage]
#     stats:
#       - { label: Places stayed, value: 14 villages }
#       - { label: Distance, value: 320 km }

