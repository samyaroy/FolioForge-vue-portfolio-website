  - id: sikkim-2022
    title: Gangtok and the high lakes of East Sikkim
    date: 2022-04-15
    location: Sikkim
    places:
      - Kolkata
      - { name: Bagdogra, mode: flight }
      - { name: Gangtok, mode: car, note: NH10 along the Teesta }
      - { name: Tsomgo Lake, mode: car, lat: 27.3742, lng: 88.7627, note: Frozen at the edges even in April }
    summary: Mountain roads along the Teesta, monastery mornings in Gangtok,
      and the still-frozen shore of Tsomgo Lake.
    coverImage: https://picsum.photos/seed/sikkim-2022/480/360
    tags: [Mountains]
    narrative:
      - The road from Bagdogra shadows the Teesta for hours, and the river's
        jade colour never quite stops feeling improbable. Gangtok arrives in
        layers — prayer flags first, then the town.
      - At Tsomgo the altitude does the talking. Twelve thousand feet, a lake
        still rimmed with ice in April, and yaks entirely unbothered by any
        of it.
    stats:
