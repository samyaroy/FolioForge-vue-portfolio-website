  - id: darjeeling-2025
    title: Toy trains and tea gardens in Darjeeling
    date: 2025-10-14
    location: Darjeeling, West Bengal
    places:
      - Kolkata
      - { name: Siliguri, mode: train, note: Overnight from Sealdah }
      - { name: Darjeeling, mode: car, note: Hill cart road climb }
    summary: A long weekend of toy trains, tea estates, and the Kanchenjunga
      skyline from Tiger Hill.
    coverImage: https://picsum.photos/seed/darjeeling-2025/480/360
    tags: [Mountains, Tea]
    narrative:
      - The overnight train from Sealdah dropped me into the plains at dawn,
        and the drive up the hill cart road did the rest — every switchback
        traded a degree of heat for a shade of green.
      - Tiger Hill at 4 a.m. was a crowd of shivering strangers who all went
        quiet at the same moment. Kanchenjunga catching the first light is
        worth every lost hour of sleep.
    stats:
      - { label: Days, value: '4' }
      - { label: Altitude, value: '2,042 m' }
    gallery:
      - https://picsum.photos/seed/darjeeling-1/600/600
      - https://picsum.photos/seed/darjeeling-2/600/600
      - https://picsum.photos/seed/darjeeling-3/600/600

  - id: goa-2025
    title: Winter week on the Goan coast
    date: 2025-12-19
    location: Goa
    places:
      - Kolkata
      - { name: Panaji, mode: flight }
      - { name: Palolem, mode: car, note: South Goa beaches }
    summary: A week of beaches, bikes, and Portuguese quarters — the
      obligatory Goa trip, finally done right.
    coverImage: https://picsum.photos/seed/goa-2025/480/360
    tags: [Beach, Friends]
    narrative:
      - We split the week between the old quarters of Panaji and the quieter
        beaches of the south. Fontainhas at golden hour looks like someone
        colour-graded an entire neighbourhood.
      - The scooter is the real hero of Goa. Fish thali stops chosen by
        instinct, sunsets chosen by whichever beach was nearest.
    stats:
      - { label: Days, value: '7' }
      - { label: Beaches, value: '6' }
    gallery:
      - https://picsum.photos/seed/goa-1/600/600
      - https://picsum.photos/seed/goa-2/600/600

  - id: varanasi-2024
    title: Ghats and galis of Varanasi
    date: 2025-11-02
    location: Varanasi, Uttar Pradesh
    places:
      - Kolkata
      - { name: Varanasi, mode: train, note: Vibhuti Express }
    summary: A solo wander through the oldest living city — dawn boat rides,
      evening aartis, and endless kachori lanes.
    coverImage: https://picsum.photos/seed/varanasi-2024/480/360
    tags: [Heritage, Solo Trip]
    narrative:
      - Varanasi doesn't do mornings quietly. By the time the sun cleared the
        far bank, the ghats were already three layers deep in pilgrims,
        photographers, and priests.
      - The lanes behind the ghats are the real map of the city. I stopped
        trying to navigate and just followed the smell of kachori and the
        sound of temple bells.
    stats:
      - { label: Days, value: '3' }
      - { label: Ghats walked, value: '28' }
    gallery:
      - https://picsum.photos/seed/varanasi-1/600/600
      - https://picsum.photos/seed/varanasi-2/600/600
      - https://picsum.photos/seed/varanasi-3/600/600

