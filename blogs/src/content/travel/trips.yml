  - id: varanasi-2024
    title: Ghats and galis of Varanasi
    date: 2024-11-02
    location: Varanasi, Uttar Pradesh
    places:
      - Kolkata
      - { name: Varanasi, mode: train, note: Vibhuti Express }
    summary: A solo wander through the oldest living city — dawn boat rides,
      evening aartis, and endless kachori lanes.
    coverImage: https://picsum.photos/seed/varanasi-2024/480/360
    tags: [Heritage, Solo Trip]
    narrative:
      - Varanasi doesn't do mornings quietly. By the time the sun cleared the
        far bank, the ghats were already three layers deep in pilgrims,
        photographers, and priests.
      - The lanes behind the ghats are the real map of the city. I stopped
        trying to navigate and just followed the smell of kachori and the
        sound of temple bells.
    stats:
      - { label: Days, value: '3' }
      - { label: Ghats walked, value: '28' }
    gallery:
      - https://picsum.photos/seed/varanasi-1/600/600
      - https://picsum.photos/seed/varanasi-2/600/600
      - https://picsum.photos/seed/varanasi-3/600/600

  - id: rajasthan-2024
    title: Forts and dunes across Rajasthan
    date: 2024-02-09
    location: Rajasthan
    places:
      - Kolkata
      - { name: Jaipur, mode: flight }
      - { name: Jodhpur, mode: train, note: The blue city }
      - { name: Jaisalmer, mode: car, note: Desert camp at Sam dunes }
    summary: Ten days tracing the fort line west — Jaipur's palaces,
      Jodhpur's blue lanes, and a night under the stars near Jaisalmer.
    coverImage: https://picsum.photos/seed/rajasthan-2024/480/360
    tags: [Heritage, Desert]
    narrative:
      - Every city on this route has its own colour. Jaipur is pink by
        decree, Jodhpur blue by tradition, and Jaisalmer gold by geology —
        the sandstone forts seem to grow straight out of the desert.
      - The night at the Sam dunes was the trip's quiet centrepiece. Camel
        silhouettes, a horizon with nothing on it, and more stars than the
        city lets you remember exist.
    stats:
      - { label: Days, value: '10' }
      - { label: Forts, value: '5' }
      - { label: Distance, value: '1,100 km' }
    gallery:
      - https://picsum.photos/seed/rajasthan-1/600/600
      - https://picsum.photos/seed/rajasthan-2/600/600
      - https://picsum.photos/seed/rajasthan-3/600/600

