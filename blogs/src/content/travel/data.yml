# Personal visit data for the travel map. Loaded through data.ts, which
# applies the types and derives per-state city counts.
#
# State names MUST match the `st_nm` property in the CDN GeoJSON
# (udit-001/india-maps-data). Edit the two lists below to keep the map up to
# date; everything else is derived automatically.
#
# stateVisits entries:
#   state    — display/GeoJSON state name
#   purpose  — academic | travel | both
#   home     — true marks your home state (hatched pattern overlay on the map)
#
# cityVisits entries:
#   name       — city name
#   visits     — number of visits
#   state      — optional, used only to disambiguate geocoding (matches admin1)
#   stayed     — true for places where you lived/stayed (college, work, etc.)
#   stayReason — optional label for why you stayed
#   home       — true marks your home city (drawn with a distinct marker)

legendLabels:
  citiesSuffix: cities
  academic: Academic
  travel: Travel
  both: Both
  homeState: Home state
  cityVisited: City visited
  stayed: Stayed / lived
  stayedTooltip: Stayed / lived here
  homeCity: Home city
  homeCityCenter: Home city center

stateVisits:
  - { state: Delhi, purpose: both }
  - { state: Tamil Nadu, purpose: academic }
  - { state: Telangana, purpose: both }
  - { state: Uttar Pradesh, purpose: travel }
  - { state: Uttarakhand, purpose: travel }
  - { state: Odisha, purpose: travel }
  - { state: Punjab, purpose: academic }
  - { state: Andhra Pradesh, purpose: travel }
  - { state: West Bengal, purpose: both, home: true }

cityVisits:
